  <p><i>This page requires JavaScript to work.</i></p>

  <div id="wrapper">
    <textarea id="writer"><h1>Title here</h1></textarea>

    <div id="preview"></div>
  </div>

  <script>
    let areaMain    = document.getElementById("writer");
    let areaPreview = document.getElementById("preview");
    let updateContentTimer;

    function updateContent()
    {
      areaPreview.innerHTML = areaMain.value;
    }

    areaMain.addEventListener('keyup', () => {
      clearTimeout(updateContentTimer);
      if (areaMain.value)
      {
        updateContentTimer = setTimeout(updateContent, 300);
      }
    });

    updateContent()
  </script>
</body>
